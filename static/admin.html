<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Whispers — Admin</title>
  <style>
    :root { --bg:#0f1226; --card:#1a1f3d; --accent:#ff5c7c; --text:#e8e9f2; --muted:#9aa0c7; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
           background: var(--bg); color: var(--text); min-height:100vh; }
    header { text-align:center; padding: 36px 16px 8px; }
    h1 { margin:0; }
    .sub { color: var(--muted); font-size:.85rem; margin-top:6px; }
    .wrap { max-width: 720px; margin: 0 auto; padding: 0 16px 60px; }
    .card { background: var(--card); border-radius: 14px; padding: 18px; margin: 16px 0; }
    input { width:100%; padding: 12px; border-radius: 10px; border:1px solid #2c3361;
            background:#12152e; color: var(--text); font-size:1rem; }
    button { margin-top: 12px; background: var(--accent); color:#fff; border:0;
             padding: 10px 18px; border-radius: 10px; font-size:1rem; cursor:pointer; }
    button:hover { filter: brightness(1.08); }
    .msg { color: var(--muted); font-size:.85rem; margin-top:8px; min-height:1em; }
    .rumor { background:#12152e; border-radius: 10px; padding: 12px 14px; margin: 10px 0;
             display:flex; justify-content: space-between; align-items:flex-start; gap:12px; }
    .rumor .body { flex:1; }
    .rumor .meta { color: var(--muted); font-size:.75rem; margin-top:6px; }
    .del { background:#3a2030; color:#ff8da3; border:1px solid #5a2c40; padding:6px 12px; }
    .del:hover { background:#4a2436; }
    .hidden { display:none; }
    a { color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>Campus Whispers — Admin</h1>
    <div class="sub">Only you can see this. Stored on your server.</div>
  </header>
  <div class="wrap">
    <div class="card" id="loginCard">
      <input id="pw" type="password" placeholder="Admin password" />
      <button id="login">Unlock</button>
      <div class="msg" id="loginMsg"></div>
    </div>

    <div class="card hidden" id="dashCard">
      <div id="list"></div>
      <a href="/">← Back to public board</a>
    </div>
  </div>

  <script>
    const loginCard = document.getElementById('loginCard');
    const dashCard = document.getElementById('dashCard');
    const listEl = document.getElementById('list');

    document.getElementById('login').onclick = async () => {
      const r = await fetch('/api/admin/login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ password: document.getElementById('pw').value })
      });
      if (r.ok) { loginCard.classList.add('hidden'); dashCard.classList.remove('hidden'); load(); }
      else document.getElementById('loginMsg').textContent = 'Wrong password.';
    };

    async function load() {
      const r = await fetch('/api/admin/rumors');
      const data = await r.json();
      listEl.innerHTML = '';
      if (!data.rumors || !data.rumors.length) {
        listEl.innerHTML = '<p class="msg">No whispers stored yet.</p>'; return;
      }
      for (const x of data.rumors) {
        const div = document.createElement('div');
        div.className = 'rumor';
        div.innerHTML = `<div class="body"><div>${escapeHtml(x.text)}</div>
          <div class="meta">#${x.id} · ${new Date(x.created_at).toLocaleString()}</div></div>`;
        const b = document.createElement('button');
        b.className = 'del'; b.textContent = 'Delete';
        b.onclick = async () => {
          await fetch('/api/admin/rumors/' + x.id, { method:'DELETE' });
          load();
        };
        div.appendChild(b);
        listEl.appendChild(div);
      }
    }
    function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
  </script>
</body>
</html>

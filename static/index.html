<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whisper Room — B.Sc.</title>
  <style>
    :root { --bg:#0f1226; --card:#1a1f3d; --accent:#7c5cff; --text:#e8e9f2; --muted:#9aa0c7; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
           background: var(--bg); color: var(--text); min-height:100vh; }
    header { text-align:center; padding: 32px 16px 8px; }
    h1 { margin:0; font-size: 2rem; }
    .sub { color: var(--muted); margin-top: 6px; font-size: .9rem; }
    .wrap { max-width: 680px; margin: 0 auto; padding: 0 16px 60px; }
    .card { background: var(--card); border-radius: 14px; padding: 18px; margin: 16px 0; }
    input { width:100%; padding: 11px; border-radius: 10px; border:1px solid #2c3361;
            background:#12152e; color: var(--text); font-size:1rem; margin-top:8px; }
    textarea { width:100%; min-height: 90px; resize: vertical; border-radius: 10px;
               border:1px solid #2c3361; background:#12152e; color: var(--text);
               padding: 12px; font-size: 1rem; margin-top:8px; }
    button { margin-top: 12px; background: var(--accent); color:#fff; border:0;
             padding: 10px 18px; border-radius: 10px; font-size:1rem; cursor:pointer; }
    button:hover { filter: brightness(1.08); }
    .msg { color: var(--muted); font-size:.85rem; margin-top:8px; min-height:1em; }
    .rumor { background: var(--card); border-radius: 12px; padding: 14px 16px; margin: 12px 0;
             border-left: 3px solid var(--accent); }
    .rumor .meta { color: var(--muted); font-size:.75rem; margin-top:8px; }
    .handle { font-weight:600; color: var(--accent); }
    .topbar { text-align:right; font-size:.85rem; color: var(--muted); }
    .streak { color:#ffd166; font-weight:600; }
    a { color: var(--muted); }
    .hidden { display:none; }
    .foot { text-align:center; color: var(--muted); font-size:.8rem; padding: 24px 16px 40px; }
    .controls { display:flex; gap:8px; flex-wrap:wrap; margin:16px 0 4px; }
    .controls button { margin-top:0; padding:7px 12px; font-size:.85rem; background:#222a52; }
    .controls button.active { background: var(--accent); }
    .reactions { margin-top:10px; display:flex; gap:6px; flex-wrap:wrap; }
    .reactions button { margin-top:0; padding:5px 10px; font-size:.85rem; background:#222a52; }
    .reactions button.on { background: var(--accent); }
    .metoo { margin-top:8px; }
    .metoo button { margin-top:0; padding:5px 10px; font-size:.8rem; background:#222a52; }
    .comments { margin-top:10px; border-top:1px solid #2c3361; padding-top:8px; }
    .comment { font-size:.85rem; padding:5px 0; border-bottom:1px solid #20264a; }
    .comment .ch { color: var(--muted); font-weight:600; }
    .comForm { display:flex; gap:6px; margin-top:8px; }
    .comForm input { margin-top:0; }
    .tags { margin-top:8px; }
    .tag { display:inline-block; background:#222a52; color:var(--muted); font-size:.72rem;
           padding:2px 8px; border-radius:10px; margin-right:4px; }
    .tagbtn { margin-top:0; padding:6px 14px; font-size:.85rem; background:#222a52;
              border-radius:20px; margin-right:6px; }
    .tagbtn.active { background: var(--accent); }
    .pts { color:#ffd166; font-weight:600; }
    .muted { color: var(--muted); font-size:.8rem; }
    .rsection { margin-top:12px; }
    .rlabel { font-size:.8rem; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin-bottom:6px; }
    .badgewrap { display:flex; flex-wrap:wrap; gap:6px; }
    .badge { background:#2a2050; color:#ffd166; font-size:.78rem; padding:4px 10px; border-radius:12px; }
    .chall { margin:8px 0; }
    .chall-top { display:flex; justify-content:space-between; align-items:center; font-size:.88rem; gap:8px; }
    .claimBtn { margin-top:0; padding:4px 12px; font-size:.8rem; background:#28a745; border-radius:14px; }
    .bar { background:#12152e; border-radius:8px; height:7px; margin:5px 0; overflow:hidden; }
    .fill { background:var(--accent); height:100%; border-radius:8px; transition:width .3s; }
    .lbrow { display:flex; justify-content:space-between; font-size:.85rem; padding:4px 0; border-bottom:1px solid #20264a; }
    summary { cursor:pointer; }
    .featured-badge { display:inline-block; background:linear-gradient(90deg,#ffd166,#ff7c5c); color:#1a1f3d; font-weight:700; font-size:.72rem; padding:2px 8px; border-radius:10px; margin-left:6px; }
    .soft { color: var(--muted); opacity:.8; font-style:italic; }
    .linkbtn { background:none; color:var(--muted); padding:0; margin-top:8px;
               text-decoration:underline; font-size:.82rem; cursor:pointer; }
    @media (max-width: 520px) {
      h1 { font-size: 1.5rem; }
      .wrap { padding: 0 10px 40px; }
      .topbar { font-size:.78rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Whisper Room — B.Sc.</h1>
  </header>
  <main class="wrap">
    <div class="topbar" id="topbar"></div>
    <!-- Register (name + password only) -->
        <div class="card" id="registerCard">
          <strong>First time? Create your account</strong>
          <input id="real_name" placeholder="Name" />
          <input id="reg_pw" type="password" placeholder="Password" />
          <button id="register">Register</button>
          <div class="msg" id="regMsg"></div>
        </div>

        <!-- Login (name + password only) -->
        <div class="card hidden" id="loginCard">
          <strong>Log in to post</strong>
          <input id="login_name" placeholder="Name" />
          <input id="login_pw" type="password" placeholder="Password" />
          <button id="login">Login</button>
          <div class="msg" id="loginMsg"></div>
          <button class="linkbtn" id="forgotLink">Forgot password?</button>
        </div>

    <!-- Forgot password -->
    <div class="card hidden" id="forgotCard">
      <strong>Reset password</strong>
      <p class="msg">Enter your handle. The admin will reset your password manually.</p>
      <input id="forgot_handle" placeholder="Handle" />
      <button id="forgotSubmit">Request reset</button>
      <div class="msg" id="forgotMsg"></div>
      <button class="linkbtn" id="backLink">Back to login</button>
    </div>

    <!-- Compose -->
    <div class="card hidden" id="composeCard">
      <span id="who"></span>
      <textarea id="text" placeholder="Whisper something about class..." maxlength="500"></textarea>
      <div class="tagpick" style="margin-top:10px">
        <span style="color:var(--muted);font-size:.82rem;margin-right:6px">Category:</span>
        <button type="button" class="tagbtn active" data-tag="rumors">rumors</button>
        <button type="button" class="tagbtn" data-tag="exam">exam</button>
      </div>
      <button id="post">Whisper</button>
      <div class="msg" id="msg"></div>
    </div>

    <!-- Rewards panel (only meaningful when logged in) -->
    <div class="card hidden" id="rewardsCard">
      <details open>
        <summary><strong>🏆 Your rewards</strong></summary>
        <div class="rsection"><div class="rlabel">Badges</div><div id="badges" class="badgewrap"></div></div>
        <div class="rsection"><div class="rlabel">Weekly challenges</div><div id="challenges"></div></div>
        <div class="rsection"><div class="rlabel">Leaderboard (anonymized)</div><div id="leaderboard"></div></div>
      </details>
    </div>

    <div class="controls">
      <button id="filterAll" class="active">All</button>
      <button id="filterRumors">rumors</button>
      <button id="filterExam">exam</button>
    </div>

    <div id="feed"></div>
  </main>
  <footer class="foot">Whisper Room — B.Sc. &middot; Anonymous handles, accountable users.</footer>

  <script>
    const $ = id => document.getElementById(id);
    const api = (method, url, body) => fetch(url, {
      method, headers: {'Content-Type':'application/json'},
      body: body ? JSON.stringify(body) : undefined
    });
    const REACTIONS = { laugh:'😂', fire:'🔥', hundred:'💯', shock:'😮' };

    let filterTag = '';  // '' = all, else 'rumors' or 'exam'
    // Privacy: we only store a boolean "logged in" flag. The handle is NEVER
    // kept in the browser or shown in the UI (it links a person to posts).
    const isLogged = () => localStorage.getItem('cw_logged') === '1';

    function showState() {
      const logged = isLogged();
      $('registerCard').classList.toggle('hidden', logged);
      $('loginCard').classList.toggle('hidden', logged);
      $('composeCard').classList.toggle('hidden', !logged);
      $('rewardsCard').classList.toggle('hidden', !logged);
      if (logged) {
        $('who').textContent = 'You are posting anonymously.';
        $('topbar').innerHTML = `<a href="#" id="logout">logout</a>`;
        $('logout').onclick = () => { localStorage.clear(); location.reload(); };
        loadMe();
      } else {
        $('topbar').innerHTML = '';
      }
    }

    function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

    async function loadMe() {
      const r = await api('GET', '/api/me');
      if (r.ok) {
        const j = await r.json();
        const streakTxt = j.streak > 0 ? `<span class="streak">🔥 ${j.streak}-day${j.streak_at_risk_today ? ' (don\'t lose it today!)' : ''}</span> · ` : '';
        const rankTxt = j.rank ? `#${j.rank}` : '—';
        $('topbar').innerHTML = `${streakTxt}<span class="pts">⭐ ${j.points} pts</span> · rank ${rankTxt} · <a href="#" id="logout">logout</a>`;
        $('logout').onclick = () => { localStorage.clear(); location.reload(); };
        renderBadges(j.badges || []);
        loadChallenges();
        loadLeaderboard();
      }
    }

    function renderBadges(badges) {
      const el = $('badges');
      if (!el) return;
      if (!badges.length) { el.innerHTML = '<span class="muted">No badges yet — post your first whisper!</span>'; return; }
      el.innerHTML = badges.map(b => `<span class="badge">🏅 ${escapeHtml(b.label)}</span>`).join('');
    }

    async function loadChallenges() {
      const el = $('challenges');
      if (!el) return;
      const r = await api('GET', '/api/challenges');
      if (!r.ok) return;
      const j = await r.json();
      el.innerHTML = j.challenges.map(c => {
        const pct = Math.round((c.progress / c.goal) * 100);
        const btn = c.completed && !c.claimed
          ? `<button class="claimBtn" data-key="${c.key}">Claim +${c.reward}</button>`
          : c.claimed ? `<span class="muted">✓ claimed</span>` : `<span class="muted">+${c.reward} pts</span>`;
        return `<div class="chall">
          <div class="chall-top"><span>${escapeHtml(c.label)}</span>${btn}</div>
          <div class="bar"><div class="fill" style="width:${pct}%"></div></div>
          <div class="muted">${c.progress}/${c.goal}</div>
        </div>`;
      }).join('');
      el.querySelectorAll('.claimBtn').forEach(b => {
        b.onclick = async () => {
          const rr = await api('POST', `/api/challenges/${b.dataset.key}/claim`);
          if (rr.ok) loadMe();
          else { const e = await rr.json(); alert(e.error || 'Could not claim'); }
        };
      });
    }

    async function loadLeaderboard() {
      const el = $('leaderboard');
      if (!el) return;
      const r = await api('GET', '/api/leaderboard');
      if (!r.ok) return;
      const j = await r.json();
      if (!j.leaderboard.length) { el.innerHTML = '<span class="muted">No players yet.</span>'; return; }
      el.innerHTML = j.leaderboard.map(x =>
        `<div class="lbrow"><span>${x.rank}. ${escapeHtml(x.alias)}</span><span class="pts">⭐ ${x.points}</span></div>`
      ).join('');
    }

    async function toggleReact(rid, kind, btn) {
      const r = await api('POST', `/api/rumors/${rid}/react`, { kind });
      if (r.ok) {
        const j = await r.json();
        btn.classList.toggle('on', j.reacted);
        // Live count update (no refresh needed)
        btn.textContent = `${REACTIONS[kind]} ${j.count}`;
      }
    }

    async function toggleMeToo(rid, btn) {
      const r = await api('POST', `/api/rumors/${rid}/metoo`);
      if (r.ok) {
        const j = await r.json();
        btn.classList.toggle('on', j.active);
        btn.textContent = `🙋 Me too${j.count ? ' ' + j.count : ''}`;
      }
    }

    async function postComment(rid, input) {
      const text = input.value.trim();
      if (!text) return;
      const r = await api('POST', `/api/rumors/${rid}/comments`, { text });
      if (r.ok) { input.value=''; load(); }
    }

    async function load() {
      const url = '/api/rumors' + (filterTag ? '?tag=' + encodeURIComponent(filterTag) : '');
      const r = await api('GET', url);
      const data = await r.json();
      $('feed').innerHTML = '';
      if (!data.rumors.length) {
        $('feed').innerHTML = '<p class="msg" style="text-align:center">No whispers yet. Be the first.</p>';
        return;
      }
      for (const x of data.rumors) {
        const isNew = x.is_new;
        const d = document.createElement('div');
        d.className = 'rumor';
        const feat = x.featured ? `<span class="featured-badge">✨ Featured</span>` : '';
        const tags = (x.tags || []).map(t => `<span class="tag">#${escapeHtml(t)}</span>`).join('');
        const softMeta = (label, n) => (isNew && !n)
          ? `<span class="soft">${label} · be the first</span>`
          : `${label} ${n || 0}`;
        d.innerHTML = `<div><span class="handle">Anonymous</span>${feat}</div>
          <div style="margin-top:6px">${escapeHtml(x.text)}</div>
          ${tags ? `<div class="tags">${tags}</div>` : ''}
          <div class="meta">${new Date(x.created_at).toLocaleString()} · ${softMeta('💬', x.comment_count)} · ${softMeta('🙋', x.me_too_count)}</div>`;
        const rc = document.createElement('div');
        rc.className = 'reactions';
        for (const [k, emoji] of Object.entries(REACTIONS)) {
          const b = document.createElement('button');
          // Rising-star floor: hide the raw 0 on fresh posts so they don't
          // read as "failed" — just show the emoji until someone reacts.
          const n = x.reactions ? x.reactions[k] : 0;
          b.textContent = (isNew && !n) ? `${emoji}` : `${emoji} ${n}`;
          if (isNew && !n) b.classList.add('soft');
          b.onclick = () => toggleReact(x.id, k, b);
          rc.appendChild(b);
        }
        d.appendChild(rc);
        const mt = document.createElement('div');
        mt.className = 'metoo';
        const mb = document.createElement('button');
        mb.textContent = `🙋 Me too${x.me_too_count ? ' ' + x.me_too_count : ''}`;
        mb.onclick = () => toggleMeToo(x.id, mb);
        mt.appendChild(mb);
        d.appendChild(mt);
        // Comments: handle hidden (privacy). Show "You" for own, else "Anonymous".
        const cm = document.createElement('div');
        cm.className = 'comments';
        const cl = document.createElement('div');
        const cr = await api('GET', `/api/rumors/${x.id}/comments`);
        const cj = await cr.json();
        const myHandle = localStorage.getItem('cw_handle');
        (cj.comments || []).forEach(c => {
          const cd = document.createElement('div');
          cd.className = 'comment';
          const label = (myHandle && c.handle === myHandle) ? 'You' : 'Anonymous';
          cd.innerHTML = `<span class="ch">${label}</span>: ${escapeHtml(c.text)}`;
          cl.appendChild(cd);
        });
        cm.appendChild(cl);
        if (isLogged()) {
          const cf = document.createElement('div');
          cf.className = 'comForm';
          const ci = document.createElement('input');
          ci.placeholder = 'Add a comment...';
          const cbtn = document.createElement('button');
          cbtn.textContent = 'Reply';
          cbtn.onclick = () => postComment(x.id, ci);
          cf.appendChild(ci); cf.appendChild(cbtn);
          cm.appendChild(cf);
        }
        d.appendChild(cm);
        $('feed').appendChild(d);
      }
    }

    $('register').onclick = async () => {
          const r = await api('POST', '/api/register', {
            real_name: $('real_name').value.trim(),
            password: $('reg_pw').value
          });
          const j = await r.json();
          if (r.ok) { $('regMsg').textContent = 'Registered! Now log in.'; $('regMsg').style.color = '#7cff9c'; }
          else $('regMsg').textContent = j.error;
        };

        $('login').onclick = async () => {
          const r = await api('POST', '/api/login', {
            real_name: $('login_name').value.trim(),
            password: $('login_pw').value
          });
          const j = await r.json();
          if (r.ok) {
            localStorage.setItem('cw_logged', '1');
            localStorage.setItem('cw_handle', j.handle);  // kept locally only, never displayed
            showState(); load(); $('loginMsg').textContent='';
          }
          else $('loginMsg').textContent = j.error;
        };

    // Category tag picker (single-select: rumors default, or exam)
    let selectedTag = 'rumors';
    document.querySelectorAll('.tagbtn').forEach(b => {
      b.onclick = () => {
        document.querySelectorAll('.tagbtn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        selectedTag = b.dataset.tag;
      };
    });

    $('post').onclick = async () => {
      const text = $('text').value.trim();
      if (!text) { $('msg').textContent = 'Write something first.'; return; }
      const tags = [selectedTag];
      const r = await api('POST', '/api/rumors', { text, tags });
      if (r.ok) { $('text').value=''; $('msg').textContent='Whispered. 🤫'; load(); }
      else $('msg').textContent = 'Could not post.';
    };

    $('forgotLink').onclick = () => {
      $('loginCard').classList.add('hidden');
      $('forgotCard').classList.remove('hidden');
    };
    $('backLink').onclick = () => {
      $('forgotCard').classList.add('hidden');
      $('loginCard').classList.remove('hidden');
    };
    $('forgotSubmit').onclick = async () => {
      const r = await api('POST', '/api/forgot-password', { handle: $('forgot_handle').value.trim() });
      const j = await r.json();
      $('forgotMsg').textContent = j.message || j.error;
      $('forgotMsg').style.color = r.ok ? '#7cff9c' : '#ff8a8a';
    };

    const FILTERS = { filterAll:'', filterRumors:'rumors', filterExam:'exam' };
    Object.keys(FILTERS).forEach(id => {
      $(id).onclick = () => {
        filterTag = FILTERS[id];
        Object.keys(FILTERS).forEach(x => $(x).classList.remove('active'));
        $(id).classList.add('active');
        load();
      };
    });

    showState();
    load();
  </script>
</body>
</html>

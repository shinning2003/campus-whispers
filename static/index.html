<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Whispers</title>
  <style>
    :root { --bg:#0f1226; --card:#1a1f3d; --accent:#7c5cff; --text:#e8e9f2; --muted:#9aa0c7; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
           background: var(--bg); color: var(--text); min-height:100vh; }
    header { text-align:center; padding: 36px 16px 12px; }
    h1 { margin:0; font-size: 2rem; letter-spacing: .5px; }
    .sub { color: var(--muted); margin-top: 6px; font-size: .9rem; }
    .wrap { max-width: 680px; margin: 0 auto; padding: 0 16px 60px; }
    .composer { background: var(--card); border-radius: 14px; padding: 16px; margin: 18px 0; }
    textarea { width:100%; min-height: 90px; resize: vertical; border-radius: 10px;
               border:1px solid #2c3361; background:#12152e; color: var(--text);
               padding: 12px; font-size: 1rem; }
    button { margin-top: 12px; background: var(--accent); color:#fff; border:0;
             padding: 10px 18px; border-radius: 10px; font-size:1rem; cursor:pointer; }
    button:hover { filter: brightness(1.08); }
    .msg { color: var(--muted); font-size:.85rem; margin-top:8px; min-height:1em; }
    .rumor { background: var(--card); border-radius: 12px; padding: 14px 16px; margin: 12px 0;
             border-left: 3px solid var(--accent); }
    .rumor .meta { color: var(--muted); font-size:.75rem; margin-top:8px; }
    .anon-tag { font-size:.7rem; background:#2c3361; color:var(--muted);
                padding:2px 8px; border-radius: 999px; }
    .admin-link { display:block; text-align:center; margin-top: 30px; color: var(--muted); font-size:.8rem; }
    a { color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>Campus Whispers</h1>
    <div class="sub">Say it anonymously. No names, no accounts. &nbsp;<span class="anon-tag">100% anonymous</span></div>
  </header>
  <div class="wrap">
    <div class="composer">
      <textarea id="text" placeholder="Whisper something about class..." maxlength="500"></textarea>
      <button id="post">Whisper</button>
      <div class="msg" id="msg"></div>
    </div>
    <div id="feed"></div>
    <a class="admin-link" href="/admin">Admin</a>
  </div>

  <script>
    const feed = document.getElementById('feed');
    const msg = document.getElementById('msg');

    async function load() {
      const r = await fetch('/api/rumors');
      const data = await r.json();
      feed.innerHTML = '';
      if (!data.rumors.length) {
        feed.innerHTML = '<p class="msg" style="text-align:center">No whispers yet. Be the first.</p>';
        return;
      }
      for (const x of data.rumors) {
        const div = document.createElement('div');
        div.className = 'rumor';
        const when = new Date(x.created_at).toLocaleString();
        div.innerHTML = `<div>${escapeHtml(x.text)}</div>
          <div class="meta">${when}</div>`;
        feed.appendChild(div);
      }
    }

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c => (
        {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
      ));
    }

    document.getElementById('post').onclick = async () => {
      const text = document.getElementById('text').value.trim();
      if (!text) { msg.textContent = 'Write something first.'; return; }
      const r = await fetch('/api/rumors', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ text })
      });
      if (r.ok) {
        document.getElementById('text').value = '';
        msg.textContent = 'Whispered. 🤫';
        load();
      } else {
        msg.textContent = 'Could not post.';
      }
    };

    load();
  </script>
</body>
</html>
